name: Metrics
on:
  # Schedule updates once a day (at midnight)
  schedule: [{cron: "0 0 * * *"}]
  # (Optional) Allow manual refresh from the Actions tab
  workflow_dispatch:
  # (Optional) Run on every push to the main branch
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: DashPriyabrata
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Singapore
          
          # Lines of Code Plugin
          plugin_lines: yes
          plugin_lines_sections: base
          
          # Notable Contributions (Shows your PRs/Issues)
          plugin_notable: no
          plugin_notable_from: all
          
          # Languages Plugin
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
